name: CMake on multiple platforms

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release]
        c_compiler: [gcc, clang, cl]
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: windows-latest
            c_compiler: clang
          - os: ubuntu-latest
            c_compiler: cl

    steps:
    - uses: actions/checkout@v4

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    # 🧱 Install dependencies and cross-compiler (Linux only)
    - name: Install cross-compiler (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y grub-pc-bin xorriso make cmake build-essential bison flex libgmp3-dev libmpc-dev libmpfr-dev texinfo wget

        # Check if already cached
        if ! command -v x86_64-elf-gcc &> /dev/null; then
          echo "Building x86_64-elf cross-compiler..."
          mkdir -p $HOME/cross && cd $HOME/cross

          # Build binutils
          wget https://ftp.gnu.org/gnu/binutils/binutils-2.41.tar.gz
          tar -xzf binutils-2.41.tar.gz
          mkdir binutils-build && cd binutils-build
          ../binutils-2.41/configure --target=x86_64-elf --prefix=/usr/local --with-sysroot --disable-nls --disable-werror
          make -j$(nproc)
          sudo make install
          cd ..

          # Build gcc (minimal)
          wget https://ftp.gnu.org/gnu/gcc/gcc-13.2.0/gcc-13.2.0.tar.gz
          tar -xzf gcc-13.2.0.tar.gz
          mkdir gcc-build && cd gcc-build
          ../gcc-13.2.0/configure --target=x86_64-elf --prefix=/usr/local --disable-nls --enable-languages=c,c++ --without-headers
          make all-gcc -j$(nproc)
          make all-target-libgcc -j$(nproc)
          sudo make install-gcc
          sudo make install-target-libgcc
        fi

        which x86_64-elf-gcc
        x86_64-elf-gcc --version

    # ⚙️ Configure CMake
    - name: Configure CMake
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/toolchain.cmake
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -S ${{ github.workspace }}

    # 🧩 Build Kernel
    - name: Build
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

    # 💿 Create bootable ISO (Linux only)
    - name: Create ISO (Linux only)
      if: runner.os == 'Linux'
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      run: cmake --build . --target iso

    # 📦 Upload build artifact
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: build-artifact-${{ matrix.os }}-${{ matrix.c_compiler }}
        path: ${{ steps.strings.outputs.build-output-dir }}

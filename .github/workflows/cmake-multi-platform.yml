name: MoiMoiOS CI Multi-Platform

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        # We are targeting a bare-metal x86_64-elf environment, so we will always use a GNU-like cross-compiler.
        # The 'compiler' matrix variable here is mostly for distinguishing job names, not actual compiler selection.
        compiler: [x86_64-elf-gcc]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v3

    - name: Install build dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential nasm grub-common grub-pc-bin xorriso mtools
        # Install cross-compiler (x86_64-elf-gcc)
        sudo apt-get install -y gcc-x86-64-elf binutils-x86-64-elf

    - name: Install build dependencies (Windows)
      if: runner.os == 'Windows'
      run: |
        # For Windows, we need a way to get x86_64-elf-gcc. MinGW-w64 is a common choice.
        # This is a simplified approach. A more robust solution might involve custom toolchain setup.
        choco install mingw --version=8.1.0 # Example: Install MinGW-w64
        echo "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        # Ensure nasm is available
        choco install nasm
        # grub-mkrescue, xorriso, mtools are typically Linux-only. ISO generation will be skipped on Windows.
        # If a Windows-based ISO creation is strictly needed, it would require a different approach (e.g., custom scripts).

    - name: Configure CMake
      # Always use the toolchain file for cross-compilation
      run: cmake -DCMAKE_TOOLCHAIN_FILE=toolchain.cmake -B build

    - name: Build kernel
      run: cmake --build build

    - name: Create ISO image (Linux only)
      if: runner.os == 'Linux'
      run: cmake --build build --target iso

    - name: Upload ISO artifact (Linux only)
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@v3
      with:
        name: moimoios-iso
        path: build/moimoios.iso

    - name: Upload kernel binary artifact (Windows only)
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v3
      with:
        name: moimoios-bin-windows
        path: build/boot/moimoios.bin

